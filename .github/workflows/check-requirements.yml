name: Check requirements files

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Regenerate requirements files
        run: |
          uv export --format requirements-txt > requirements.txt
          uv export --format requirements-txt --group dev > requirements-dev.txt

      - name: Check for drift
        run: |
          if ! git diff --exit-code requirements.txt requirements-dev.txt; then
            echo ""
            echo "::error::requirements.txt または requirements-dev.txt が pyproject.toml / uv.lock と一致していません。"
            echo "::error::ローカルで 'make update-req' を実行してコミットしてください。"
            exit 1
          fi
